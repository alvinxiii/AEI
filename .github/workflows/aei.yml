name: AEI Production Readiness

# AEI acts as an AI Release Manager: on every pull request it evaluates the
# change across Quality, Cost and Governance and posts a Production Readiness
# Report as a PR comment, failing the check when the verdict is BLOCK.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AEI readiness report
        id: aei
        run: |
          set +e
          python aei.py \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --cost-mode runtime \
            --format markdown \
            --out report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post / update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- AEI-REPORT -->';
            let report;
            try {
              report = fs.readFileSync('report.md', 'utf8');
            } catch (e) {
              report = '## 🤖 AEI — Production Readiness Report\n\n' +
                       '⚠️ AEI failed to produce a report. Check the workflow logs.';
            }
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce verdict (fail on BLOCK)
        if: steps.aei.outputs.exit_code == '2'
        run: |
          echo "::error::AEI verdict is BLOCK — see the Production Readiness Report comment."
          exit 1
